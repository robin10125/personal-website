<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Robin Hylands</title>
  <link rel="stylesheet" href="styles.css">
  <script src="projects.js" defer></script>
  <script src="project-dates.js" defer></script>
  <script src="site.js" defer></script>
</head>
<body>
  <main class="site-shell">
    <section class="education-strip" aria-labelledby="site-title">
      <div class="title-row">
        <h1 id="site-title">Robin Hylands</h1>
        <nav class="contact-links" id="contact-links" aria-label="Contact links"></nav>
      </div>
      <div class="header-details">
        <div class="education-row">
          <h2 id="education-heading">Education</h2>
          <p id="education-details">Education details placeholder. Edit this text in projects.js.</p>
        </div>
        <div class="about-row">
          <h2 id="about-heading">About</h2>
          <p id="about-details">About details placeholder. Edit this text in projects.js.</p>
        </div>
      </div>
    </section>

    <section class="project-layout" aria-label="Projects">
      <section class="panel research-panel" aria-labelledby="research-heading">
        <div class="section-heading">
          <h2 id="research-heading">Research Projects</h2>
        </div>
        <div class="card-grid" id="research-projects"></div>

        <section class="other-panel" aria-labelledby="other-heading">
          <div class="section-heading">
            <h2 id="other-heading">Other Projects</h2>
          </div>
          <div class="card-grid compact-grid" id="other-projects"></div>
        </section>
      </section>

      <aside class="right-column">
        <section class="panel tech-panel" aria-labelledby="tech-heading">
          <div class="section-heading">
            <h2 id="tech-heading">Technical Projects</h2>
          </div>
          <div class="card-grid compact-grid" id="tech-projects"></div>
        </section>
      </aside>
    </section>
  </main>
</body>
</html>
